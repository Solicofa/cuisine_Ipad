<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>Galerie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:        #F2EDE3;
    --ink-dim:    #B9B2A4;
    --ink-faint:  #6E6A60;
    --brass:      #C8A862;
    --void:       #121110;
    --panel:      #1B1917;
  }

  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html,body{
    width:100%; height:100%;
    overflow:hidden;
    background:var(--void);
    font-family:'Jost', sans-serif;
    color:var(--ink);
    position:fixed;
    font-size:18px;
  }

  /* ---------- Conteneur 3 pages ---------- */
  .pages{
    display:flex;
    width:300vw; height:100%;
    transition:transform 0.45s cubic-bezier(.4,0,.2,1);
    transform:translateX(-100vw);
  }

  .page{
    width:100vw; height:100%;
    flex-shrink:0;
    position:relative;
    overflow:hidden;
  }

  /* ===================== PAGE 0 : INFOS DU JOUR ===================== */

  .page-infos{
    background:var(--void);
    padding:4vh 5vw 6vh;
    display:grid;
    grid-template-columns:1.6fr 1fr;
    grid-template-rows:auto 1fr auto;
    gap:2.5vh 3vw;
  }

  /* En-tête */
  .infos-header{
    grid-column:1 / -1;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    border-bottom:1px solid #2a2825;
    padding-bottom:1.5vh;
  }

  .infos-header h1{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:300;
    font-size:clamp(1.8rem, 4vw, 2.8rem);
  }

  .infos-header .today-date{
    font-size:0.8rem;
    letter-spacing:0.25em;
    text-transform:uppercase;
    color:var(--brass);
  }

  /* ---- Bloc météo ---- */
  .meteo-bloc{
    background:var(--panel);
    border-radius:16px;
    padding:2.5vh 2.5vw;
    display:flex;
    flex-direction:column;
    gap:2vh;
    overflow:hidden;
    grid-row: 2;
  }

  .meteo-bloc h2{
    font-size:0.7rem;
    letter-spacing:0.3em;
    text-transform:uppercase;
    color:var(--ink-faint);
    font-weight:400;
  }

  .meteo-now{
    display:flex;
    align-items:center;
    gap:2vw;
  }

  .meteo-now .big-temp{
    font-family:'Cormorant Garamond', serif;
    font-weight:300;
    font-style:italic;
    font-size:clamp(4rem, 8vw, 6rem);
    line-height:1;
    color:var(--ink);
  }

  .meteo-divider{
    width:1px;
    height:3.5rem;
    background:#2a2825;
    flex-shrink:0;
  }

  .meteo-now .meteo-detail{
    display:flex;
    flex-direction:column;
    gap:0.35rem;
  }

  .meteo-now .meteo-desc{
    font-size:1rem;
    color:var(--ink);
    font-weight:300;
  }

  .meteo-now .meteo-minmax{
    font-size:0.82rem;
    color:var(--ink-dim);
    letter-spacing:0.05em;
  }

  .meteo-now .meteo-wind{
    font-size:0.82rem;
    color:var(--ink-dim);
    letter-spacing:0.05em;
  }

  .meteo-hours{
    display:flex;
    gap:1.2rem;
    overflow-x:auto;
    padding-bottom:0.3rem;
    border-top:1px solid #2a2825;
    padding-top:1.5vh;
  }

  .meteo-hours::-webkit-scrollbar{ display:none; }

  .hour-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:0.35rem;
    flex-shrink:0;
  }

  .hour-item .h-time{
    font-size:0.68rem;
    letter-spacing:0.12em;
    color:var(--ink-faint);
    text-transform:uppercase;
  }

  .hour-item .h-icon{ font-size:1.1rem; }

  .hour-item .h-temp{
    font-family:'Cormorant Garamond', serif;
    font-size:1.15rem;
    font-weight:300;
    color:var(--ink);
  }

  /* ---- Bloc actualités ---- */
  .news-bloc{
    background:var(--panel);
    border-radius:16px;
    padding:2.5vh 2.5vw;
    display:flex;
    flex-direction:column;
    gap:1.5vh;
    overflow:hidden;
    grid-row: 2 / 4;
  }

  .news-bloc h2{
    font-size:0.7rem;
    letter-spacing:0.3em;
    text-transform:uppercase;
    color:var(--ink-faint);
    font-weight:400;
    flex-shrink:0;
  }

  .news-list{
    display:flex;
    flex-direction:column;
    gap:0;
    overflow-y:auto;
    flex:1;
  }

  .news-list::-webkit-scrollbar{ display:none; }

  .news-item{
    display:flex;
    gap:0;
    align-items:stretch;
    padding:1rem 0;
    border-bottom:1px solid #222120;
  }

  .news-item:last-child{ border-bottom:none; }

  .news-item .news-text{
    font-size:0.88rem;
    line-height:1.5;
    color:var(--ink-dim);
    font-weight:300;
  }

  /* ---- Blocs trajets (côte à côte en bas à gauche) ---- */
  .trajets-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:2vw;
    grid-row:3;
  }

  .trajet-bloc{
    background:var(--panel);
    border-radius:16px;
    padding:2vh 2vw;
    display:flex;
    flex-direction:column;
    gap:0.6vh;
  }

  .trajet-bloc h2{
    font-size:0.7rem;
    letter-spacing:0.3em;
    text-transform:uppercase;
    color:var(--ink-faint);
    font-weight:400;
  }

  .trajet-time{
    display:flex;
    align-items:baseline;
    gap:0.4rem;
    margin-top:0.3vh;
  }

  .trajet-time .t-val{
    font-family:'Cormorant Garamond', serif;
    font-weight:300;
    font-size:clamp(2.2rem, 5vw, 3.8rem);
    color:var(--brass);
    line-height:1;
  }

  .trajet-time .t-unit{
    font-size:0.9rem;
    color:var(--ink-dim);
    letter-spacing:0.08em;
    margin-bottom:0.2rem;
  }

  .t-traffic{
    font-size:0.75rem;
    letter-spacing:0.08em;
    font-weight:400;
    margin-top:0.2vh;
  }

  /* ===================== PAGE 1 : GALERIE ===================== */

  .stage{
    position:absolute; inset:0;
    overflow:hidden;
  }

  .slide{
    position:absolute; inset:0;
    background-size:cover;
    background-position:center;
    opacity:0;
    transition:opacity 2.5s ease;
    animation:kenburns 38s ease-in-out infinite;
  }

  .slide.active{ opacity:1; }

  @keyframes kenburns{
    0%   { transform:scale(1);    }
    50%  { transform:scale(1.06); }
    100% { transform:scale(1);    }
  }

  .stage::after{
    content:"";
    position:absolute; inset:0;
    background:
      linear-gradient(to top,    rgba(10,9,8,.65) 0%, rgba(10,9,8,0) 30%),
      linear-gradient(to bottom, rgba(10,9,8,.45) 0%, rgba(10,9,8,0) 35%);
    pointer-events:none;
  }

  .top-right{
    position:absolute; top:5vh; right:6vw;
    text-align:right;
    z-index:2;
  }

  .clock{
    font-family:'Cormorant Garamond', serif;
    font-weight:300;
    font-size:clamp(4rem, 10vw, 8rem);
    line-height:1;
    letter-spacing:0.02em;
  }

  .clock span{ color:var(--brass); }

  .date{
    margin-top:0.4rem;
    font-size:1rem;
    font-weight:300;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--ink-dim);
  }

  .weather{
    margin-top:1.4rem;
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:0.25rem;
  }

  .weather .temp{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:1.9rem;
    font-weight:300;
  }

  .weather .desc{
    font-size:0.85rem;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--ink-dim);
  }

  .label{
    position:absolute; left:6vw; bottom:6vh;
    max-width:60vw;
    z-index:2;
    opacity:0;
    transform:translateY(8px);
    transition:opacity 1.2s ease, transform 1.2s ease;
  }

  .label.active{ opacity:1; transform:translateY(0); }

  .label .rule{
    width:2.5rem; height:1px;
    background:var(--brass);
    margin-bottom:0.9rem;
  }

  .label .artist{
    font-size:0.9rem;
    letter-spacing:0.25em;
    text-transform:uppercase;
    color:var(--ink);
    margin-bottom:0.4rem;
  }

  .label .title{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:300;
    font-size:clamp(1.2rem, 2.4vw, 1.8rem);
    color:var(--ink-dim);
  }

  /* ===================== PAGE 2 : AUJOURD'HUI ===================== */

  .page-today{
    background:var(--void);
    padding:5vh 5vw;
    display:flex;
    flex-direction:column;
  }

  .page-today h1{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:300;
    font-size:clamp(2.2rem, 5vw, 3.2rem);
    margin-bottom:0.6rem;
  }

  .page-today .rule{
    width:3rem; height:1px;
    background:var(--brass);
    margin-bottom:3vh;
  }

  .today-grid{
    flex:1;
    display:flex;
    gap:5vw;
    min-height:0;
  }

  .list-col{
    flex:1.1;
    min-width:0;
    display:flex;
    flex-direction:column;
    gap:1.2rem;
  }

  .list-col h2, .timer-col h2{
    font-size:0.85rem;
    letter-spacing:0.25em;
    text-transform:uppercase;
    color:var(--ink-dim);
    font-weight:400;
  }

  .list-add{
    display:flex;
    gap:0.6rem;
    align-items:center;
  }

  .list-add input{
    flex:1;
    background:transparent;
    border:none;
    border-bottom:1px solid var(--ink-faint);
    color:var(--ink);
    font-family:'Jost', sans-serif;
    font-size:1rem;
    font-weight:300;
    padding:0.4rem 0.2rem;
    outline:none;
  }

  .list-add input::placeholder{ color:var(--ink-faint); }
  .list-add input:focus{ border-bottom-color:var(--brass); }

  .list-add button{
    background:transparent;
    border:1px solid var(--ink-faint);
    color:var(--ink-dim);
    font-size:1.2rem;
    width:34px; height:34px;
    border-radius:50%;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:border-color .25s, color .25s;
    flex-shrink:0;
  }

  .list-add button:active{ border-color:var(--brass); color:var(--brass); }

  .item-list{
    list-style:none;
    display:flex;
    flex-direction:column;
    gap:1rem;
    overflow-y:auto;
    flex:1;
  }

  .item-list li{
    display:flex;
    align-items:center;
    gap:0.9rem;
    font-size:1.1rem;
    position:relative;
  }

  .item-list li .dot{
    width:20px; height:20px;
    border:1px solid var(--ink-faint);
    border-radius:50%;
    flex-shrink:0;
    cursor:pointer;
    transition:border-color .3s ease, background .3s ease;
  }

  .item-list li.checked .dot{ border-color:var(--brass); background:var(--brass); }

  .item-list li .item-text{
    cursor:pointer;
    transition:color .3s, opacity .3s;
  }

  .item-list li.checked .item-text{ color:var(--ink-faint); text-decoration:line-through; }

  .item-list li .del-btn{
    margin-left:auto;
    background:transparent;
    border:none;
    color:var(--ink-faint);
    font-size:1.1rem;
    cursor:pointer;
    padding:0 0.3rem;
    flex-shrink:0;
    transition:color .2s;
  }

  .item-list li .del-btn:active{ color:#c0392b; }

  .timer-col{
    flex:0.9;
    display:flex;
    flex-direction:column;
    min-width:0;
    gap:1.2rem;
  }

  .timer-display{
    font-family:'Cormorant Garamond', serif;
    font-weight:300;
    font-size:clamp(3.8rem, 9vw, 7rem);
    line-height:1;
    letter-spacing:0.04em;
    transition:color .3s ease;
  }

  .timer-display.running{ color:var(--brass); }
  .timer-display.done{ color:var(--brass); animation:pulse 1s ease-in-out infinite; }

  @keyframes pulse{
    0%,100%{ opacity:1; }
    50%{ opacity:0.35; }
  }

  .presets{ display:flex; flex-wrap:wrap; gap:0.7rem; }

  .presets button, .controls button{
    font-family:'Jost', sans-serif;
    font-size:0.85rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--ink-dim);
    background:transparent;
    border:1px solid var(--ink-faint);
    border-radius:999px;
    padding:0.55rem 1.15rem;
    cursor:pointer;
    transition:border-color .25s ease, color .25s ease;
  }

  .presets button:active, .controls button:active{ border-color:var(--brass); color:var(--brass); }

  .controls{ display:flex; gap:0.7rem; }
  .controls button.primary{ border-color:var(--brass); color:var(--brass); }

  /* ---------- Points de navigation ---------- */

  .dots{
    position:fixed; bottom:3vh; left:50%;
    transform:translateX(-50%);
    display:flex; gap:0.5rem;
    z-index:10;
  }

  .dots .d{
    width:7px; height:7px;
    border-radius:50%;
    background:var(--ink-faint);
    transition:background .3s ease;
    cursor:pointer;
  }

  .dots .d.active{ background:var(--brass); }
</style>
</head>
<body>

<div class="pages" id="pages">

  <!-- ========== PAGE 0 : INFOS DU JOUR ========== -->
  <div class="page page-infos">

    <div class="infos-header">
      <h1>Infos du jour</h1>
      <span class="today-date" id="infosDate">—</span>
    </div>

    <!-- Météo détaillée -->
    <div class="meteo-bloc">
      <h2>Météo — Saint-Martin-d'Abbat</h2>
      <div class="meteo-now">
        <div class="big-temp" id="bigTemp">--°</div>
        <div class="meteo-divider"></div>
        <div class="meteo-detail">
          <span class="meteo-desc" id="meteoDesc">—</span>
          <span class="meteo-minmax" id="meteoMinMax">— / —</span>
          <span class="meteo-wind" id="meteoWind">Vent : —</span>
        </div>
      </div>
      <div class="meteo-hours" id="meteoHours"></div>
    </div>

    <!-- Actualités Le Monde -->
    <div class="news-bloc">
      <h2>Le Monde — À la une</h2>
      <div class="news-list" id="newsList">
        <div class="news-item"><span class="news-text" style="color:var(--ink-faint)">Chargement des actualités...</span></div>
      </div>
    </div>

    <!-- Trajets côte à côte -->
    <div class="trajets-row">
      <div class="trajet-bloc">
        <h2>Vers Saint-Jean-de-Braye</h2>
        <div class="trajet-time">
          <span class="t-val" id="tval1">--</span>
          <span class="t-unit">min</span>
        </div>
        <span class="t-traffic" id="traffic1">Chargement...</span>
      </div>

      <div class="trajet-bloc">
        <h2>Vers Chécy</h2>
        <div class="trajet-time">
          <span class="t-val" id="tval2">--</span>
          <span class="t-unit">min</span>
        </div>
        <span class="t-traffic" id="traffic2">Chargement...</span>
      </div>
    </div>

  </div>

  </div>

  <!-- ========== PAGE 1 : GALERIE ========== -->
  <div class="page">
    <div class="stage" id="stage"></div>

    <div class="top-right">
      <div class="clock" id="clock">--<span>:</span>--</div>
      <div class="date" id="date">—</div>
      <div class="weather">
        <div class="temp" id="temp">--°</div>
        <div class="desc" id="desc">météo</div>
      </div>
    </div>

    <div class="label" id="label">
      <div class="rule"></div>
      <div class="artist" id="artist">—</div>
      <div class="title" id="title">—</div>
    </div>
  </div>

  <!-- ========== PAGE 2 : AUJOURD'HUI ========== -->
  <div class="page page-today">
    <h1>Aujourd'hui</h1>
    <div class="rule"></div>

    <div class="today-grid">
      <div class="list-col">
        <h2>Courses &amp; Notes</h2>
        <div class="list-add">
          <input type="text" id="newItem" placeholder="Ajouter un élément..." />
          <button id="addBtn">+</button>
        </div>
        <ul class="item-list" id="itemList"></ul>
      </div>

      <div class="timer-col">
        <h2>Minuteur</h2>
        <div class="timer-display" id="timerDisplay">00:00</div>
        <div class="presets" id="presets"></div>
        <div class="controls">
          <button id="startBtn" class="primary">Démarrer</button>
          <button id="resetBtn">Réinitialiser</button>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="dots">
  <div class="d" data-page="0"></div>
  <div class="d active" data-page="1"></div>
  <div class="d" data-page="2"></div>
</div>

<script>
/* =====================================================================
   CONFIGURATION
   ===================================================================== */

const LATITUDE  = 47.8575;
const LONGITUDE = 2.2694;
const SLIDE_DURATION = 45;

const ARTWORKS = [
  { url:"https://raw.githubusercontent.com/Solicofa/cuisine_Ipad/main/052366FA-4F4F-48F1-95CB-98E58369D757.jpeg", artist:"Claude Monet", title:"Les Nymphéas" },
  { url:"https://raw.githubusercontent.com/Solicofa/cuisine_Ipad/main/542F3F09-381E-4ADC-B2A9-38619DCAC034.jpeg", artist:"Katsushika Hokusai", title:"La Grande Vague de Kanagawa" },
  { url:"https://raw.githubusercontent.com/Solicofa/cuisine_Ipad/main/61AA2BEF-6E2C-4535-A23A-F5649AC674EC.jpeg", artist:"Paul Signac", title:"Le Port de Saint-Tropez" },
  { url:"https://raw.githubusercontent.com/Solicofa/cuisine_Ipad/main/66EDE48A-81CA-443E-A66C-223AF664CD27.jpeg", artist:"Jean-Baptiste Camille Corot", title:"Le Jardin des Tuileries" },
  { url:"https://raw.githubusercontent.com/Solicofa/cuisine_Ipad/main/9AA38315-1899-437E-AE93-12188AD3BC07.jpeg", artist:"Sandro Botticelli", title:"La Naissance de Vénus" },
  { url:"https://raw.githubusercontent.com/Solicofa/cuisine_Ipad/main/BDB5E62F-A187-4240-8415-DD77C163C5FC.jpeg", artist:"John Singer Sargent", title:"Le Sphinx" },
  { url:"https://raw.githubusercontent.com/Solicofa/cuisine_Ipad/main/CF472F90-118B-460B-8E0F-0EFC2D91100D.jpeg", artist:"Vincent van Gogh", title:"La Nuit étoilée" },
  { url:"https://raw.githubusercontent.com/Solicofa/cuisine_Ipad/main/CFC32383-DFC6-4D98-B251-5CCE15294E82.jpeg", artist:"Gustav Klimt", title:"Église à Cassone" },
  { url:"https://raw.githubusercontent.com/Solicofa/cuisine_Ipad/main/D3840F72-DEFA-485C-82A5-B6663AC5C9DF.jpeg", artist:"Paul Gauguin", title:"La Seine au pont d'Iéna" }
];

const DEFAULT_ITEMS = ["Pain","Lait","Œufs","Légumes pour la semaine"];
const TIMER_PRESETS = [1, 5, 10, 15, 20, 30];

/* =====================================================================
   Horloge & date
   ===================================================================== */

const DAYS   = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MONTHS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

function formatDate(now){
  return `${DAYS[now.getDay()]} ${now.getDate()} ${MONTHS[now.getMonth()]}`;
}

function updateClock(){
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').innerHTML = `${h}<span>:</span>${m}`;
  document.getElementById('date').textContent = formatDate(now);
  document.getElementById('infosDate').textContent = formatDate(now);
}
updateClock();
setInterval(updateClock, 1000 * 15);

/* =====================================================================
   Météo détaillée (Open-Meteo)
   ===================================================================== */

const WEATHER_LABELS = {
  0:"Ciel dégagé",1:"Plutôt dégagé",2:"Partiellement nuageux",3:"Couvert",
  45:"Brouillard",48:"Brouillard givrant",
  51:"Bruine légère",53:"Bruine",55:"Bruine dense",
  61:"Pluie légère",63:"Pluie",65:"Pluie forte",
  71:"Neige légère",73:"Neige",75:"Neige forte",
  80:"Averses",81:"Averses",82:"Averses fortes",
  95:"Orage",96:"Orage",99:"Orage violent"
};

const WEATHER_ICONS = {
  0:"☀️",1:"🌤️",2:"⛅",3:"☁️",

async function updateWeather(){
  try{
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${LATITUDE}&longitude=${LONGITUDE}`
      + `&current_weather=true`
      + `&daily=temperature_2m_max,temperature_2m_min`
      + `&hourly=temperature_2m,weathercode`
      + `&timezone=Europe%2FParis&forecast_days=1`;
    const res = await fetch(url);
    const data = await res.json();
    const cw = data.current_weather;
    const code = cw.weathercode;

    // Galerie
    document.getElementById('temp').textContent = `${Math.round(cw.temperature)}°`;
    document.getElementById('desc').textContent = WEATHER_LABELS[code] || '—';

    // Page infos
    document.getElementById('bigTemp').textContent  = `${Math.round(cw.temperature)}°`;
    document.getElementById('meteoDesc').textContent = WEATHER_LABELS[code] || '—';
    document.getElementById('meteoMinMax').textContent =
      `${Math.round(data.daily.temperature_2m_min[0])}° / ${Math.round(data.daily.temperature_2m_max[0])}°`;
    document.getElementById('meteoWind').textContent = `Vent : ${Math.round(cw.windspeed)} km/h`;

    // Prévisions heure par heure (6 prochaines heures)
    const nowH = new Date().getHours();
    const hoursEl = document.getElementById('meteoHours');
    hoursEl.innerHTML = '';
    for(let i = nowH; i < nowH + 7 && i < 24; i++){
      const div = document.createElement('div');
      div.className = 'hour-item';
      const hCode = data.hourly.weathercode[i] || 0;
      div.innerHTML = `
        <span class="h-time">${String(i).padStart(2,'0')}h</span>
        <span class="h-icon">${WEATHER_ICONS[hCode] || '—'}</span>
        <span class="h-temp">${Math.round(data.hourly.temperature_2m[i])}°</span>
      `;
      hoursEl.appendChild(div);
    }
  }catch(e){
    document.getElementById('desc').textContent = 'météo indisponible';
    document.getElementById('meteoDesc').textContent = 'météo indisponible';
  }
}
updateWeather();
setInterval(updateWeather, 1000 * 60 * 30);

/* =====================================================================
   Actualités Le Monde (via rss2json)
   ===================================================================== */

async function loadNews(){
  const newsEl = document.getElementById('newsList');
  const proxies = [
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`
  ];
  const rssUrl = 'https://www.lemonde.fr/rss/une.xml';

  for(const makeProxy of proxies){
    try{
      const res = await fetch(makeProxy(rssUrl));
      if(!res.ok) continue;
      const raw = await res.text();
      // allorigins wraps in JSON
      let xml = raw;
      try{ const j = JSON.parse(raw); xml = j.contents || raw; }catch(e){}
      const parser = new DOMParser();
      const doc = parser.parseFromString(xml, 'text/xml');
      const items = Array.from(doc.querySelectorAll('item')).slice(0, 8);
      if(!items.length) continue;
      newsEl.innerHTML = '';
      items.forEach(item => {
        const title = item.querySelector('title')?.textContent || '';
        const div = document.createElement('div');
        div.className = 'news-item';
        div.innerHTML = `<div class="rule"></div><span class="news-text">${title}</span>`;
        newsEl.appendChild(div);
      });
      return; // succès, on arrête
    }catch(e){ continue; }
  }
  newsEl.innerHTML = '<div class="news-item"><span class="news-text" style="color:var(--ink-faint)">Actualités indisponibles</span></div>';
}
loadNews();
setInterval(loadNews, 1000 * 60 * 15);

/* =====================================================================
   Temps de trajet en temps réel (TomTom Routing + Geocoding)
   ===================================================================== */

const TOMTOM_KEY = 'o0GEXBiqMfbxXcPqFX55STJS6dQQvNHa';
const ORIGIN_COORD = '47.8575,2.2694';

const ROUTES = [
  {
    id: 'tval1',
    trafficId: 'traffic1',
    address: '11 avenue Ampère Saint-Jean-de-Braye 45800'
  },
  {
    id: 'tval2',
    trafficId: 'traffic2',
    address: '7 rue Arago Chécy 45430'
  }
];

async function geocode(address){
  const url = `https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(address)}&limit=1`;
  const res = await fetch(url);
  const data = await res.json();
  const coords = data.features?.[0]?.geometry?.coordinates;
  if(!coords) throw new Error('Adresse introuvable');
  return `${coords[1]},${coords[0]}`; // lat,lon
}

async function fetchRouteData(route, destCoord){
  try{
    const url = `https://api.tomtom.com/routing/1/calculateRoute/${ORIGIN_COORD}:${destCoord}/json`
      + `?key=${TOMTOM_KEY}&traffic=true&travelMode=car&language=fr-FR`;
    const res = await fetch(url);
    const data = await res.json();
    const summary = data.routes?.[0]?.summary;
    if(!summary) throw new Error();

    const minutes = Math.round(summary.travelTimeInSeconds / 60);
    const delayMin = Math.round((summary.trafficDelayInSeconds || 0) / 60);

    document.getElementById(route.id).textContent = minutes;

    const trafficEl = document.getElementById(route.trafficId);
    if(delayMin <= 2){
      trafficEl.textContent = '● Trafic fluide';
      trafficEl.style.color = '#5cb85c';
    } else if(delayMin <= 10){
      trafficEl.textContent = `● +${delayMin} min de retard`;
      trafficEl.style.color = '#f0ad4e';
    } else {
      trafficEl.textContent = `● +${delayMin} min — trafic chargé`;
      trafficEl.style.color = '#d9534f';
    }
  }catch(e){
    document.getElementById(route.id).textContent = '--';
    document.getElementById(route.trafficId).textContent = 'indisponible';
  }
}

// Géocode les destinations une seule fois au chargement, puis met à jour toutes les 5 min
let cachedCoords = [];

async function initRoutes(){
  for(const route of ROUTES){
    try{
      const coord = await geocode(route.address);
      cachedCoords.push({ route, coord });
      await fetchRouteData(route, coord);
    }catch(e){
      document.getElementById(route.id).textContent = '--';
      document.getElementById(route.trafficId).textContent = 'adresse introuvable';
    }
  }
}

async function updateRoutes(){
  for(const { route, coord } of cachedCoords){
    await fetchRouteData(route, coord);
  }
}

initRoutes();
setInterval(updateRoutes, 1000 * 60 * 5);

/* =====================================================================
   Liste éditable
   ===================================================================== */

const itemListEl = document.getElementById('itemList');
const newItemEl  = document.getElementById('newItem');
const addBtnEl   = document.getElementById('addBtn');
const STORAGE_KEY = 'galerie-cuisine-liste-v2';

function loadItems(){
  try{
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if(saved && Array.isArray(saved)) return saved;
  }catch(e){}
  return DEFAULT_ITEMS.map(text => ({ text, checked:false }));
}

function saveItems(items){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }catch(e){} }

let items = loadItems();

function renderItems(){
  itemListEl.innerHTML = '';
  items.forEach((item, i) => {
    const li = document.createElement('li');
    li.className = item.checked ? 'checked' : '';
    const dot = document.createElement('span');
    dot.className = 'dot';
    dot.addEventListener('click', () => { items[i].checked = !items[i].checked; saveItems(items); renderItems(); });
    const text = document.createElement('span');
    text.className = 'item-text';
    text.textContent = item.text;
    text.addEventListener('click', () => { items[i].checked = !items[i].checked; saveItems(items); renderItems(); });
    const del = document.createElement('button');
    del.className = 'del-btn';
    del.textContent = '✕';
    del.addEventListener('click', (e) => { e.stopPropagation(); items.splice(i, 1); saveItems(items); renderItems(); });
    li.appendChild(dot); li.appendChild(text); li.appendChild(del);
    itemListEl.appendChild(li);
  });
}

function addItem(){
  const val = newItemEl.value.trim();
  if(!val) return;
  items.push({ text:val, checked:false });
  saveItems(items);
  renderItems();
  newItemEl.value = '';
  newItemEl.focus();
}

addBtnEl.addEventListener('click', addItem);
newItemEl.addEventListener('keydown', e => { if(e.key === 'Enter') addItem(); });
renderItems();

/* =====================================================================
   Minuteur
   ===================================================================== */

const timerDisplay = document.getElementById('timerDisplay');
const presetsEl    = document.getElementById('presets');
const startBtn     = document.getElementById('startBtn');
const resetBtn     = document.getElementById('resetBtn');
let totalSeconds = 0, remaining = 0, timerInterval = null, isRunning = false;

function formatTime(sec){ return `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`; }
function renderTimer(){ timerDisplay.textContent = formatTime(Math.max(remaining,0)); timerDisplay.classList.toggle('running', isRunning); }

TIMER_PRESETS.forEach(min => {
  const btn = document.createElement('button');
  btn.textContent = min + ' min';
  btn.addEventListener('click', () => { stopTimer(); totalSeconds = min*60; remaining = totalSeconds; renderTimer(); });
  presetsEl.appendChild(btn);
});

function beep(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0,0.35,0.7].forEach(d => { const o=ctx.createOscillator(),g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value=880; g.gain.value=0.15; o.start(ctx.currentTime+d); o.stop(ctx.currentTime+d+0.25); });
  }catch(e){}
}

function stopTimer(){ clearInterval(timerInterval); timerInterval=null; isRunning=false; timerDisplay.classList.remove('done'); startBtn.textContent='Démarrer'; renderTimer(); }

function startTimer(){
  if(remaining<=0) return;
  isRunning=true; startBtn.textContent='Pause'; timerDisplay.classList.remove('done');
  timerInterval=setInterval(()=>{ remaining--; renderTimer(); if(remaining<=0){ clearInterval(timerInterval); timerInterval=null; isRunning=false; startBtn.textContent='Démarrer'; timerDisplay.classList.add('done'); beep(); }},1000);
}

startBtn.addEventListener('click', ()=>{ if(isRunning){ clearInterval(timerInterval); timerInterval=null; isRunning=false; startBtn.textContent='Démarrer'; renderTimer(); } else startTimer(); });
resetBtn.addEventListener('click', ()=>{ stopTimer(); remaining=totalSeconds; renderTimer(); });
renderTimer();

/* =====================================================================
   Navigation par glissement
   ===================================================================== */

const pagesEl = document.getElementById('pages');
const dotsEl  = document.querySelectorAll('.dots .d');
let pageIndex = 1;
let touchStartX = 0, touchStartY = 0;

function goToPage(i){
  pageIndex = Math.max(0, Math.min(2, i));
  pagesEl.style.transform = `translateX(${-pageIndex * 100}vw)`;
  dotsEl.forEach((d,j) => d.classList.toggle('active', j === pageIndex));
}

document.addEventListener('touchstart', e=>{ touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; },{ passive:true });
document.addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)){ if(dx<0) goToPage(pageIndex+1); else goToPage(pageIndex-1); }
},{ passive:true });

dotsEl.forEach(d=>{ d.addEventListener('click',()=>goToPage(parseInt(d.dataset.page))); });
</script>
