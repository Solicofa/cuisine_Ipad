<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>Galerie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:        #F2EDE3;
    --ink-dim:    #B9B2A4;
    --ink-faint:  #6E6A60;
    --brass:      #C8A862;
    --void:       #121110;
    --panel:      #1B1917;
  }

  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html,body{
    width:100%; height:100%;
    overflow:hidden;
    background:var(--void);
    font-family:'Jost', sans-serif;
    color:var(--ink);
    position:fixed;
  }

  /* ---------- Conteneur des pages (swipe) ---------- */

  .pages{
    display:flex;
    width:200vw; height:100%;
    transition: transform 0.45s cubic-bezier(.4,0,.2,1);
  }

  .page{
    width:100vw; height:100%;
    flex-shrink:0;
    position:relative;
    overflow:hidden;
  }

  /* ---------- PAGE 1 : Galerie ---------- */

  .stage{
    position:absolute; inset:0;
    overflow:hidden;
  }

  .slide{
    position:absolute; inset:0;
    background-size:cover;
    background-position:center;
    opacity:0;
    transition:opacity 2.5s ease;
    animation:kenburns 38s ease-in-out infinite;
  }

  .slide.active{ opacity:1; }

  @keyframes kenburns{
    0%   { transform:scale(1);    }
    50%  { transform:scale(1.06); }
    100% { transform:scale(1);    }
  }

  .stage::after{
    content:"";
    position:absolute; inset:0;
    background:
      linear-gradient(to top,    rgba(10,9,8,.65) 0%, rgba(10,9,8,0) 30%),
      linear-gradient(to bottom, rgba(10,9,8,.45) 0%, rgba(10,9,8,0) 35%);
    pointer-events:none;
  }

  .top-right{
    position:absolute; top:5vh; right:6vw;
    text-align:right;
    z-index:2;
  }

  .clock{
    font-family:'Cormorant Garamond', serif;
    font-weight:300;
    font-size:clamp(3.5rem, 9vw, 7rem);
    line-height:1;
    letter-spacing:0.02em;
  }

  .clock span{ color:var(--brass); }

  .date{
    margin-top:0.4rem;
    font-size:0.85rem;
    font-weight:300;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--ink-dim);
  }

  .weather{
    margin-top:1.4rem;
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:0.2rem;
  }

  .weather .temp{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:1.6rem;
    font-weight:300;
  }

  .weather .desc{
    font-size:0.7rem;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--ink-dim);
  }

  .label{
    position:absolute; left:6vw; bottom:6vh;
    max-width:60vw;
    z-index:2;
    opacity:0;
    transform:translateY(8px);
    transition:opacity 1.2s ease, transform 1.2s ease;
  }

  .label.active{
    opacity:1;
    transform:translateY(0);
  }

  .label .rule{
    width:2.5rem;
    height:1px;
    background:var(--brass);
    margin-bottom:0.9rem;
  }

  .label .artist{
    font-size:0.78rem;
    letter-spacing:0.25em;
    text-transform:uppercase;
    color:var(--ink);
    margin-bottom:0.35rem;
  }

  .label .title{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:300;
    font-size:clamp(1.1rem, 2.2vw, 1.6rem);
    color:var(--ink-dim);
  }

  /* ---------- PAGE 2 : Aujourd'hui ---------- */

  .page-today{
    background:var(--void);
    padding:6vh 6vw;
    display:flex;
    flex-direction:column;
  }

  .page-today h1{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:300;
    font-size:clamp(2.2rem, 5vw, 3.5rem);
    margin-bottom:0.6rem;
  }

  .page-today .rule{
    width:3rem; height:1px;
    background:var(--brass);
    margin-bottom:4vh;
  }

  .today-grid{
    flex:1;
    display:flex;
    gap:6vw;
    min-height:0;
  }

  /* ---- Liste ---- */

  .list-col{
    flex:1.1;
    min-width:0;
  }

  .list-col h2, .timer-col h2{
    font-size:0.75rem;
    letter-spacing:0.25em;
    text-transform:uppercase;
    color:var(--ink-dim);
    margin-bottom:1.6rem;
    font-weight:400;
  }

  .item-list{
    list-style:none;
    display:flex;
    flex-direction:column;
    gap:1.1rem;
    overflow-y:auto;
  }

  .item-list li{
    display:flex;
    align-items:center;
    gap:0.9rem;
    font-size:clamp(1rem, 1.8vw, 1.3rem);
    cursor:pointer;
    transition:color .3s ease, opacity .3s ease;
  }

  .item-list li .dot{
    width:18px; height:18px;
    border:1px solid var(--ink-faint);
    border-radius:50%;
    flex-shrink:0;
    position:relative;
    transition:border-color .3s ease;
  }

  .item-list li.checked .dot{
    border-color:var(--brass);
    background:var(--brass);
  }

  .item-list li.checked{
    color:var(--ink-faint);
    text-decoration:line-through;
  }

  /* ---- Minuteur ---- */

  .timer-col{
    flex:0.9;
    display:flex;
    flex-direction:column;
    min-width:0;
  }

  .timer-display{
    font-family:'Cormorant Garamond', serif;
    font-weight:300;
    font-size:clamp(3.5rem, 9vw, 6.5rem);
    line-height:1;
    letter-spacing:0.04em;
    margin-bottom:2.5rem;
    transition:color .3s ease;
  }

  .timer-display.running{ color:var(--brass); }
  .timer-display.done{
    color:var(--brass);
    animation:pulse 1s ease-in-out infinite;
  }

  @keyframes pulse{
    0%,100%{ opacity:1; }
    50%{ opacity:0.35; }
  }

  .presets{
    display:flex;
    flex-wrap:wrap;
    gap:0.7rem;
    margin-bottom:1.6rem;
  }

  .presets button, .controls button{
    font-family:'Jost', sans-serif;
    font-size:0.8rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--ink-dim);
    background:transparent;
    border:1px solid var(--ink-faint);
    border-radius:999px;
    padding:0.55rem 1.15rem;
    cursor:pointer;
    transition:border-color .25s ease, color .25s ease;
  }

  .presets button:active, .controls button:active{
    border-color:var(--brass);
    color:var(--brass);
  }

  .controls{
    display:flex;
    gap:0.7rem;
  }

  .controls button.primary{
    border-color:var(--brass);
    color:var(--brass);
  }

  /* ---------- Indicateur de pages ---------- */

  .dots{
    position:absolute; bottom:3vh; left:50%;
    transform:translateX(-50%);
    display:flex; gap:0.5rem;
    z-index:3;
  }

  .dots .d{
    width:6px; height:6px;
    border-radius:50%;
    background:var(--ink-faint);
    transition:background .3s ease;
  }

  .dots .d.active{ background:var(--brass); }

</style>
</head>
<body>

<div class="pages" id="pages">

  <!-- PAGE 1 : GALERIE -->
  <div class="page">
    <div class="stage" id="stage"></div>

    <div class="top-right">
      <div class="clock" id="clock">--<span>:</span>--</div>
      <div class="date" id="date">—</div>
      <div class="weather">
        <div class="temp" id="temp">--°</div>
        <div class="desc" id="desc">météo</div>
      </div>
    </div>

    <div class="label" id="label">
      <div class="rule"></div>
      <div class="artist" id="artist">—</div>
      <div class="title" id="title">—</div>
    </div>
  </div>

  <!-- PAGE 2 : AUJOURD'HUI -->
  <div class="page page-today">
    <h1>Aujourd'hui</h1>
    <div class="rule"></div>

    <div class="today-grid">
      <div class="list-col">
        <h2>À faire / Courses</h2>
        <ul class="item-list" id="itemList"></ul>
      </div>

      <div class="timer-col">
        <h2>Minuteur</h2>
        <div class="timer-display" id="timerDisplay">00:00</div>
        <div class="presets" id="presets"></div>
        <div class="controls">
          <button id="startBtn" class="primary">Démarrer</button>
          <button id="resetBtn">Réinitialiser</button>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="dots">
  <div class="d active" data-page="0"></div>
  <div class="d" data-page="1"></div>
</div>

<script>
/* =====================================================================
   CONFIGURATION — à adapter
   ===================================================================== */

// Coordonnées pour la météo (Open-Meteo, pas de clé requise)
const LATITUDE  = 48.8566;
const LONGITUDE = 2.3522;

// Durée d'affichage de chaque oeuvre (en secondes)
const SLIDE_DURATION = 45;

// Tes oeuvres
const ARTWORKS = [
  {
    url: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg/1600px-Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg",
    artist: "Vincent van Gogh",
    title: "La Nuit étoilée, 1889"
  },
  {
    url: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Tsunami_by_hokusai_19th_century.jpg/1600px-Tsunami_by_hokusai_19th_century.jpg",
    artist: "Katsushika Hokusai",
    title: "La Grande Vague de Kanagawa, vers 1831"
  },
  {
    url: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Claude_Monet_-_Water_Lilies_-_1906%2C_Ryerson.jpg/1600px-Claude_Monet_-_Water_Lilies_-_1906%2C_Ryerson.jpg",
    artist: "Claude Monet",
    title: "Nymphéas, 1906"
  },
  {
    url: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/The_Kiss_-_Gustav_Klimt_-_Google_Cultural_Institute.jpg/1600px-The_Kiss_-_Gustav_Klimt_-_Google_Cultural_Institute.jpg",
    artist: "Gustav Klimt",
    title: "Le Baiser, 1908"
  }
];

// Liste "Aujourd'hui" — édite librement
const DEFAULT_ITEMS = [
  "Pain",
  "Lait",
  "Oeufs",
  "Légumes pour la semaine",
  "Appeler le garagiste"
];

// Préréglages du minuteur (en minutes)
const TIMER_PRESETS = [1, 5, 10, 15, 20, 30];

/* =====================================================================
   Horloge
   ===================================================================== */

function updateClock(){
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').innerHTML = `${h}<span>:</span>${m}`;

  const days = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  document.getElementById('date').textContent =
    `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]}`;
}
updateClock();
setInterval(updateClock, 1000 * 15);

/* =====================================================================
   Météo (Open-Meteo, gratuit, sans clé)
   ===================================================================== */

const WEATHER_LABELS = {
  0:"Ciel dégagé", 1:"Plutôt dégagé", 2:"Partiellement nuageux", 3:"Couvert",
  45:"Brouillard", 48:"Brouillard givrant",
  51:"Bruine légère", 53:"Bruine", 55:"Bruine dense",
  61:"Pluie légère", 63:"Pluie", 65:"Pluie forte",
  71:"Neige légère", 73:"Neige", 75:"Neige forte",
  80:"Averses", 81:"Averses", 82:"Averses fortes",
  95:"Orage", 96:"Orage", 99:"Orage violent"
};

async function updateWeather(){
  try{
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${LATITUDE}&longitude=${LONGITUDE}&current_weather=true`;
    const res = await fetch(url);
    const data = await res.json();
    const cw = data.current_weather;
    document.getElementById('temp').textContent = `${Math.round(cw.temperature)}°`;
    document.getElementById('desc').textContent = WEATHER_LABELS[cw.weathercode] || '—';
  }catch(e){
    document.getElementById('desc').textContent = 'météo indisponible';
  }
}
updateWeather();
setInterval(updateWeather, 1000 * 60 * 30);

/* =====================================================================
   Diaporama
   ===================================================================== */

const stage = document.getElementById('stage');
const labelEl = document.getElementById('label');
const artistEl = document.getElementById('artist');
const titleEl = document.getElementById('title');

let currentSlide = 0;
let slides = [];

ARTWORKS.forEach(art => {
  const div = document.createElement('div');
  div.className = 'slide';
  div.style.backgroundImage = `url("${art.url}")`;
  stage.appendChild(div);
  slides.push(div);
});

function showSlide(index){
  slides.forEach((s,i) => s.classList.toggle('active', i === index));
  labelEl.classList.remove('active');
  setTimeout(() => {
    artistEl.textContent = ARTWORKS[index].artist;
    titleEl.textContent = ARTWORKS[index].title;
    labelEl.classList.add('active');
  }, 600);
}

showSlide(0);
setInterval(() => {
  currentSlide = (currentSlide + 1) % slides.length;
  showSlide(currentSlide);
}, SLIDE_DURATION * 1000);

/* =====================================================================
   Liste "Aujourd'hui" (persistée localement)
   ===================================================================== */

const itemListEl = document.getElementById('itemList');
const STORAGE_KEY = 'galerie-cuisine-liste';

function loadItems(){
  try{
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (saved && Array.isArray(saved)) return saved;
  }catch(e){}
  return DEFAULT_ITEMS.map(text => ({ text, checked:false }));
}

function saveItems(items){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }catch(e){}
}

let items = loadItems();

function renderItems(){
  itemListEl.innerHTML = '';
  items.forEach((item, i) => {
    const li = document.createElement('li');
    li.className = item.checked ? 'checked' : '';
    li.innerHTML = `<span class="dot"></span><span>${item.text}</span>`;
    li.addEventListener('click', () => {
      items[i].checked = !items[i].checked;
      saveItems(items);
      renderItems();
    });
    itemListEl.appendChild(li);
  });
}
renderItems();

/* =====================================================================
   Minuteur de cuisine
   ===================================================================== */

const timerDisplay = document.getElementById('timerDisplay');
const presetsEl = document.getElementById('presets');
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');

let totalSeconds = 0;
let remaining = 0;
let timerInterval = null;
let isRunning = false;

function formatTime(sec){
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function renderTimer(){
  timerDisplay.textContent = formatTime(Math.max(remaining,0));
  timerDisplay.classList.toggle('running', isRunning);
}

TIMER_PRESETS.forEach(min => {
  const btn = document.createElement('button');
  btn.textContent = min + ' min';
  btn.addEventListener('click', () => {
    stopTimer();
    totalSeconds = min * 60;
    remaining = totalSeconds;
    renderTimer();
  });
  presetsEl.appendChild(btn);
});

function beep(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.35, 0.7].forEach(delay => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.value = 0.15;
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.25);
    });
  }catch(e){}
}

function stopTimer(){
  clearInterval(timerInterval);
  timerInterval = null;
  isRunning = false;
  timerDisplay.classList.remove('done');
  startBtn.textContent = 'Démarrer';
  renderTimer();
}

function startTimer(){
  if (remaining <= 0) return;
  isRunning = true;
  startBtn.textContent = 'Pause';
  timerDisplay.classList.remove('done');
  timerInterval = setInterval(() => {
    remaining--;
    renderTimer();
    if (remaining <= 0){
      clearInterval(timerInterval);
      timerInterval = null;
      isRunning = false;
      startBtn.textContent = 'Démarrer';
      timerDisplay.classList.add('done');
      beep();
    }
  }, 1000);
}

startBtn.addEventListener('click', () => {
  if (isRunning){
    clearInterval(timerInterval);
    timerInterval = null;
    isRunning = false;
    startBtn.textContent = 'Démarrer';
    renderTimer();
  } else {
    startTimer();
  }
});

resetBtn.addEventListener('click', () => {
  stopTimer();
  remaining = totalSeconds;
  renderTimer();
});

renderTimer();

/* =====================================================================
   Navigation par glissement
   ===================================================================== */

const pagesEl = document.getElementById('pages');
const dots = document.querySelectorAll('.dots .d');
let pageIndex = 0;
let touchStartX = 0;
let touchStartY = 0;

function goToPage(i){
  pageIndex = Math.max(0, Math.min(1, i));
  pagesEl.style.transform = `translateX(-${pageIndex * 100}vw)`;
  dots.forEach((d,j) => d.classList.toggle('active', j === pageIndex));
}

document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive:true });

document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)){
    if (dx < 0) goToPage(pageIndex + 1);
    else goToPage(pageIndex - 1);
  }
}, { passive:true });

dots.forEach(d => {
  d.addEventListener('click', () => goToPage(parseInt(d.dataset.page)));
});

</script>
</body>
</html>
